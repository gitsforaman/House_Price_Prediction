<!DOCTYPE html>
<html>
<head>

<title>AI House Predictor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0b1220;
    color: white;
    overflow-x: hidden;
}

/* ================= LOADER ================= */
#loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #111827, #0b1220);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    z-index: 9999;
}

/* FLOATING ORBS */
.orb {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    filter: blur(35px);
    animation: float 6s infinite ease-in-out;
}

.orb1 { top: 10%; left: 10%; background: rgba(34,197,94,0.15); }
.orb2 { bottom: 10%; right: 10%; background: rgba(99,102,241,0.15); }

/* TEXT */
.title {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 900;
    background: linear-gradient(90deg, #22c55e, #60a5fa);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: clamp(14px, 4vw, 18px);
    margin-top: 6px;
    font-weight: 600;
}

.tagline {
    font-size: clamp(11px, 3vw, 13px);
    opacity: 0.7;
    margin-top: 4px;
}

/* PROGRESS BAR */
.progress-box {
    width: 90%;
    max-width: 320px;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
    margin-top: 20px;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    transition: width 0.2s ease;
}

#percent {
    margin-top: 10px;
    font-size: 14px;
}

/* ================= FORM ================= */
#formContainer {
    display: none;
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 15px;
}

/* CARD */
.card {
    width: 100%;
    max-width: 450px;
    padding: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    border-radius: 16px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

label {
    font-size: 12px;
    opacity: 0.85;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
}

/* SELECT FIX */
select option {
    background: #111827;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    color: white;
    font-weight: bold;
}

/* ================= ANIMATION ================= */
@keyframes float {
    0%,100% {transform:translateY(0)}
    50% {transform:translateY(-25px)}
}

/* ================= MOBILE ================= */
@media (max-width: 480px) {

    .card {
        padding: 15px;
    }

    input, select {
        font-size: 13px;
        padding: 10px;
    }

    button {
        padding: 12px;
    }
}

/* ================= TABLET ================= */
@media (min-width: 600px) and (max-width: 1024px) {
    .card {
        max-width: 520px;
    }
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="title">Welcome</div>

    <div class="subtitle">
        to Bhoomi Kashyap & Aman Srivastava's Project
    </div>

    <div class="tagline">
        AI Powered House Price Prediction System
    </div>

    <div class="progress-box">
        <div class="progress" id="progressBar"></div>
    </div>

    <div id="percent">0%</div>

</div>

<!-- FORM -->
<div id="formContainer">

    <div class="card">

        <h2 style="text-align:center;">🏠 AI House Predictor</h2>

        <form action="/loading" method="POST">

            <label>City</label>
            <select name="location">
                {% for loc in locations %}
                <option value="{{loc}}">{{loc}}</option>
                {% endfor %}
            </select>

            <label>Area (sqft)</label>
            <input type="number" name="sqft">

            <label>BHK</label>
            <input type="number" name="bhk">

            <label>Bathrooms</label>
            <input type="number" name="bath">

            <button type="submit">Predict Price</button>

        </form>

    </div>

</div>

<script>

/* LOADER PROGRESS */
let progress = 0;

let interval = setInterval(() => {

    progress += 2;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("percent").innerText = progress + "%";

    if(progress >= 100){
        clearInterval(interval);

        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("formContainer").style.display = "flex";
        }, 300);
    }

}, 50);

</script>

</body>
</html>
