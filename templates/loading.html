<!DOCTYPE html>
<html>

<head>

<style>

body{
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    font-family:Arial;
}

.loader{
    width:70px;
    height:70px;
    border:6px solid #333;
    border-top:6px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="loader"></div>
<h3>AI Processing Data...</h3>

<form id="f" action="/result" method="POST">

<input type="hidden" name="location" value="{{data['location']}}">
<input type="hidden" name="sqft" value="{{data['sqft']}}">
<input type="hidden" name="bath" value="{{data['bath']}}">
<input type="hidden" name="bhk" value="{{data['bhk']}}">

</form>

<script>
setTimeout(()=>{
    document.getElementById("f").submit();
}, 2000);
</script>

</body>
</html>
